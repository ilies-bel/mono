name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build (${{ matrix.asset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: mono-linux-x64
          - target: bun-linux-x64-baseline
            asset: mono-linux-x64-baseline
          - target: bun-linux-arm64
            asset: mono-linux-arm64
          - target: bun-darwin-x64
            asset: mono-darwin-x64
            sign: true
          - target: bun-darwin-x64-baseline
            asset: mono-darwin-x64-baseline
            sign: true
          - target: bun-darwin-arm64
            asset: mono-darwin-arm64
            sign: true
          - target: bun-windows-x64
            asset: mono-windows-x64.exe
          - target: bun-windows-x64-baseline
            asset: mono-windows-x64-baseline.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install ldid (macOS targets only)
        if: matrix.sign
        run: sudo apt-get update && sudo apt-get install -y ldid

      - name: Cross-compile ${{ matrix.target }}
        run: |
          mkdir -p dist
          bun build src/index.ts \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --outfile dist/${{ matrix.asset }}

      - name: Ad-hoc sign macOS binary
        if: matrix.sign
        run: ldid -S dist/${{ matrix.asset }}

      - name: Compute SHA-256 checksum
        working-directory: dist
        run: sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Aggregate checksums
        working-directory: artifacts
        run: |
          cat *.sha256 | sort > SHA256SUMS
          rm -f *.sha256

      - name: Stage install script alongside assets
        run: cp install.sh artifacts/install.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/mono-*
            artifacts/SHA256SUMS
            artifacts/install.sh

  homebrew-tap:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip silently if HOMEBREW_TAP_TOKEN secret isn't configured. Lets the
    # release workflow stay green for users who haven't created a tap yet.
    if: ${{ vars.HOMEBREW_TAP_REPO != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Render Formula/mono.rb for ${{ env.TAG }}
        run: |
          mkdir -p out
          bash scripts/render-formula.sh "${TAG}" > out/mono.rb
          cat out/mono.rb

      - name: Push formula to ${{ vars.HOMEBREW_TAP_REPO }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP: ${{ vars.HOMEBREW_TAP_REPO }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "x HOMEBREW_TAP_TOKEN secret missing — set a PAT with contents:write on ${TAP}" >&2
            exit 1
          fi
          git clone --depth=1 "https://x-access-token:${GH_TOKEN}@github.com/${TAP}.git" tap
          mkdir -p tap/Formula
          cp out/mono.rb tap/Formula/mono.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "✓ formula already up to date"
            exit 0
          fi
          git add Formula/mono.rb
          git commit -m "mono ${TAG}"
          git push origin HEAD
